name: PR Validation

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Install dependencies
      run: go mod download
    
    - name: Run tests
      run: |
        echo "Running Go tests..."
        go test -v -json ./... > test-results.json
    
    - name: Report test results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Go Tests
        path: test-results.json
        reporter: golang-json
        fail-on-error: true

  build-image:
    name: Build Test Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Build and cache Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        tags: stream-webpage:test-${{ github.run_id }}
        outputs: type=docker,dest=/tmp/stream-webpage-${{ github.run_id }}.tar
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v7
      with:
        name: docker-image-${{ github.run_id }}
        path: /tmp/stream-webpage-${{ github.run_id }}.tar
        retention-days: 1

  integration-test:
    name: "Integration Test: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: [test, build-image]
    if: needs.test.result == 'success' && needs.build-image.result == 'success'
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single-video scenarios (legacy mode, no STREAM_OUTPUTS)
          - name: "single-720p"
            resolution: "720p"
            stream_outputs: ""
            expected_video_count: 1
            expected_dims: "1280x720"
          - name: "single-1080p"
            resolution: "1080p"
            stream_outputs: ""
            expected_video_count: 1
            expected_dims: "1920x1080"
          - name: "single-2k"
            resolution: "2k"
            stream_outputs: ""
            expected_video_count: 1
            expected_dims: "2560x1440"
          # Multi-video scenario (enhanced RTMP multitrack)
          - name: "multitrack-3-tracks"
            resolution: "1080p"
            stream_outputs: '[{"width":1920,"height":1080,"framerate":60},{"width":1280,"height":720,"framerate":60},{"width":1080,"height":1920,"framerate":30}]'
            expected_video_count: 3
            expected_dims: "1080x1920 1280x720 1920x1080"

    services:
      rtmp-server:
        image: bluenviron/mediamtx:latest
        ports:
          - 1935:1935
          - 8554:8554
          - 8888:8888
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Download Docker image artifact
      uses: actions/download-artifact@v8
      with:
        name: docker-image-${{ github.run_id }}
        path: /tmp
    
    - name: Load Docker image
      run: docker load -i /tmp/stream-webpage-${{ github.run_id }}.tar

    - name: Install static FFmpeg 8.1.2 (ffprobe)
      run: |
        echo "Installing static ffprobe from mwader/static-ffmpeg:8.1.2..."
        docker create --name ffmpeg-extract mwader/static-ffmpeg:8.1.2
        docker cp ffmpeg-extract:/ffprobe /usr/local/bin/ffprobe
        docker cp ffmpeg-extract:/ffmpeg /usr/local/bin/ffmpeg
        docker rm ffmpeg-extract
        chmod +x /usr/local/bin/ffprobe /usr/local/bin/ffmpeg
        ffprobe -version | head -1
    
    - name: Start stream-webpage container
      run: |
        EXTRA_ENV=""
        if [ -n '${{ matrix.stream_outputs }}' ] && [ '${{ matrix.stream_outputs }}' != '' ]; then
          EXTRA_ENV="-e STREAM_OUTPUTS='${{ matrix.stream_outputs }}'"
        fi
        
        docker run -d \
          --name stream-webpage \
          --network host \
          -e FRAMERATE=30 \
          -e LOG_FORMAT=json \
          -e LOG_LEVEL=debug \
          -e PORT=8080 \
          -e RESOLUTION=${{ matrix.resolution }} \
          -e RTMP_URL=rtmp://localhost:1935/live/stream \
          -e WEBPAGE_URL="https://www.youtube.com/embed/xuCn8ux2gbs?autoplay=1&loop=1&playlist=xuCn8ux2gbs" \
          ${EXTRA_ENV} \
          stream-webpage:test-${{ github.run_id }}
    
    - name: Wait for services to start
      run: |
        echo "Waiting for services to start..."
        sleep 90

    - name: Test Stream Container Health Endpoint
      run: |
        echo "Testing stream container health endpoint..."
        response=$(curl -s -w "%{http_code}" http://localhost:8080/health)
        http_code="${response: -3}"
        response_body="${response%???}"
        
        echo "HTTP Status: $http_code"
        echo "Response: $response_body"
        
        if [[ "$http_code" != "200" ]]; then
          echo "Health check failed with HTTP status: $http_code"
          exit 1
        else
          echo "Health check passed"
        fi
    
    - name: Test RTMP stream
      run: |
        echo "Testing RTMP stream..."
        
        # Wait for RTMP server
        timeout 30 bash -c '
          while ! nc -z localhost 1935; do
            echo "Waiting for RTMP server..."
            sleep 2
          done
          echo "RTMP server is ready"
        '
        
        # Wait for video stream to appear
        echo "Waiting for video stream with ffprobe..."
        timeout 300 bash -c '
          while true; do
            if ffprobe -v quiet -print_format json -show_streams rtmp://localhost:1935/live/stream > stream_info.json 2>/dev/null; then
              video_count=$(jq -r "[.streams[] | select(.codec_type == \"video\")] | length" stream_info.json)
              if [ "$video_count" -gt 0 ]; then
                echo "Video stream(s) found! Count: $video_count"
                break
              fi
            fi
            echo "Stream not yet available, retrying..."
            sleep 3
          done
        ' || {
          echo "Timeout waiting for video stream, checking container logs..."
          docker logs stream-webpage
          exit 1
        }

    - name: Validate stream properties
      run: |
        echo "=== Stream Validation ==="
        cat stream_info.json | jq '.'
        
        # Count video streams
        video_count=$(jq -r '[.streams[] | select(.codec_type == "video")] | length' stream_info.json)
        echo "Video track count: $video_count (expected: ${{ matrix.expected_video_count }})"
        
        if [ "$video_count" != "${{ matrix.expected_video_count }}" ]; then
          echo "FAIL: Expected ${{ matrix.expected_video_count }} video track(s), got $video_count"
          docker logs stream-webpage
          exit 1
        fi
        
        # Count audio streams
        audio_count=$(jq -r '[.streams[] | select(.codec_type == "audio")] | length' stream_info.json)
        echo "Audio track count: $audio_count (expected: 1)"
        
        if [ "$audio_count" != "1" ]; then
          echo "FAIL: Expected exactly 1 audio track, got $audio_count"
          docker logs stream-webpage
          exit 1
        fi
        
        # Check dimensions (sorted for order-independent comparison)
        actual_dims=$(jq -r '[.streams[] | select(.codec_type == "video") | "\(.width)x\(.height)"] | sort | join(" ")' stream_info.json)
        expected_dims=$(echo "${{ matrix.expected_dims }}" | tr ' ' '\n' | sort | tr '\n' ' ' | sed 's/ $//')
        
        echo "Actual dimensions (sorted): $actual_dims"
        echo "Expected dimensions (sorted): $expected_dims"
        
        if [ "$actual_dims" != "$expected_dims" ]; then
          echo "FAIL: Dimensions mismatch"
          echo "  Expected: $expected_dims"
          echo "  Got:      $actual_dims"
          docker logs stream-webpage
          exit 1
        fi
        
        echo "All stream validations passed!"
    
    - name: Cleanup
      if: always()
      run: |
        echo "Stopping stream-webpage container..."
        docker stop stream-webpage || true
        docker rm stream-webpage || true
